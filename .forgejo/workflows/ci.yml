name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  verify:
    runs-on: docker
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Install system packages
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            if command -v sudo >/dev/null 2>&1; then
              SUDO=sudo
            else
              SUDO=
            fi
            $SUDO apt-get update
            $SUDO apt-get install -y curl git python3 python3-pip file build-essential pkg-config libssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          fi

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --component rustfmt clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install pre-commit
        run: python3 -m pip install --user pre-commit

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Run repo hygiene checks
        run: pre-commit run --all-files

      - name: Run tests
        run: bun test

      - name: Run type checks
        run: bun run typecheck

      - name: Run lint checks
        run: bun run lint

      - name: Build desktop frontend
        run: bun run build

      - name: Run Rust compile checks
        run: bun run check:rust
