exclude: |
  (?x)^(
    packages/desktop/src/bindings\.ts|
    packages/(app|desktop|ui)/src/.*\.(d\.ts(\.map)?|js|jsx)$
  )$

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.9.0
    hooks:
      - id: gitleaks
        args: ["--redact"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: ^packages/desktop/src-tauri/icons/icon\.icns$
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-json
        exclude: ^services/foundry-core/app/
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: ^services/foundry-core/app/
      - id: trailing-whitespace
        exclude: ^services/foundry-core/app/
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.6
    hooks:
      - id: biome-check
        stages: [manual]
        exclude: ^(services/foundry-core/app/|packages/desktop/src/styles\.css$)

  - repo: https://github.com/crate-ci/typos
    rev: v1.9.0
    hooks:
      - id: typos
        exclude: ^services/foundry-core/app/

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        stages: [manual]
        exclude: ^services/foundry-core/app/

  - repo: local
    hooks:
      - id: solid-eslint
        name: solid · eslint
        entry: bun run lint:eslint
        language: system
        pass_filenames: false
        files: ^packages/(app|ui|desktop)/src/.*\.(ts|tsx)$

      - id: cargo-fmt
        name: rust · cargo fmt
        entry: cargo fmt --manifest-path packages/desktop/src-tauri/Cargo.toml --all -- --check
        language: system
        pass_filenames: false
        files: ^packages/desktop/src-tauri/.*\.(rs|toml)$
