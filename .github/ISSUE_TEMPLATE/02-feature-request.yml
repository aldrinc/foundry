name: Feature request
description: Propose a product, platform, or developer-experience improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are most useful when they explain the underlying workflow and tradeoffs.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - Control-plane server
        - Collaboration core
        - Self-hosting and deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is hard, missing, or inefficient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Who needs this and what does success look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
