version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /packages/desktop/src-tauri
    schedule:
      interval: weekly
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /services/foundry-server
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 5
