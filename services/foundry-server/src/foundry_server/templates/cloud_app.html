<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='cloud/app.css') }}" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #0f2d31 0%, #163338 100%); color: #ecf3f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <div style="padding: 1.25rem 1.5rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.12); background: rgba(255, 255, 255, 0.06);">
          Foundry Cloud requires JavaScript.
        </div>
      </div>
    </noscript>
    <script>
      window.__FOUNDRY_CLOUD_BOOTSTRAP__ = {{ bootstrap | tojson }};
    </script>
    <script type="module" src="{{ url_for('static', path='cloud/app.js') }}"></script>
  </body>
</html>
