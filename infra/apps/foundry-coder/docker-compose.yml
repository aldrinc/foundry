services:
  foundry-coder-postgres:
    image: postgres:16-alpine
    container_name: foundry-coder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CODER_DB_USER:-coder}
      POSTGRES_PASSWORD: ${CODER_DB_PASSWORD:-change-me}
      POSTGRES_DB: ${CODER_DB_NAME:-coder}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  foundry-coder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODER_UPSTREAM_REF: ${CODER_UPSTREAM_REF:-v2.31.3}
        CODER_UPSTREAM_REPOSITORY: ${CODER_UPSTREAM_REPOSITORY:-https://github.com/coder/coder.git}
        CODER_RUNTIME_IMAGE: ${CODER_RUNTIME_IMAGE:-ghcr.io/coder/coder:v2.31.3}
        GO_VERSION: ${GO_VERSION:-1.25.7}
    image: foundry-coder:dev
    container_name: foundry-coder
    restart: unless-stopped
    depends_on:
      - foundry-coder-postgres
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      CODER_HTTP_ADDRESS: ${CODER_HTTP_ADDRESS:-0.0.0.0:7080}
      CODER_ACCESS_URL: ${CODER_ACCESS_URL}
      CODER_WILDCARD_ACCESS_URL: ${CODER_WILDCARD_ACCESS_URL:-}
      CODER_PG_CONNECTION_URL: postgres://${CODER_DB_USER:-coder}:${CODER_DB_PASSWORD:-change-me}@foundry-coder-postgres:5432/${CODER_DB_NAME:-coder}?sslmode=disable
      CODER_DISABLE_PASSWORD_AUTH: ${CODER_DISABLE_PASSWORD_AUTH:-false}
      CODER_TELEMETRY_ENABLE: ${CODER_TELEMETRY_ENABLE:-false}
      CODER_PROVISIONER_DAEMONS: ${CODER_PROVISIONER_DAEMONS:-1}
    volumes:
      - ./data/coder:/home/coder
    ports:
      - "127.0.0.1:17080:7080"
